version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: marketing-os-postgres
    environment:
      POSTGRES_USER: marketing
      POSTGRES_PASSWORD: marketing
      POSTGRES_DB: marketing_os
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U marketing']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: marketing-os-redis
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: packages/api
      dockerfile: Dockerfile
    container_name: marketing-os-api
    environment:
      DATABASE_URL: postgresql://marketing:marketing@postgres:5432/marketing_os
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      NODE_ENV: development
      PORT: 3000
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./packages/api/src:/app/src

volumes:
  postgres_data:
