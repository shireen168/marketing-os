name: Update GBrain Index

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:
    branches:
      - main

jobs:
  gbrain-index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GBrain
        run: |
          if ! command -v gbrain &> /dev/null; then
            curl -fsSL https://bun.sh/install | bash
            export PATH="$HOME/.bun/bin:$PATH"
            bunx gbrain init --skip-prompt || true
          fi

      - name: Index codebase
        run: |
          export PATH="$HOME/.bun/bin:$PATH"
          gbrain index --skip-prompt || true

      - name: Commit GBrain cache
        run: |
          git config user.name "gbrain-bot"
          git config user.email "noreply@github.com"
          git add .gbrain-cache .gbrain-source 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update gbrain index"

      - name: Push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git push
          fi
