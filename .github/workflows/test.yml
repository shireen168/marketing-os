name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v3

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build workspaces
        run: |
          npm run build --workspace=@marketing-os/api
          npm run build --workspace=@marketing-os/mcp

      - name: Verify builds
        run: |
          test -f packages/api/dist/index.js && echo "API build OK"
          test -f packages/mcp/dist/server.js && echo "MCP build OK"

  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: packages/api
          tags: |
            ${{ github.actor }}/marketing-os-api:latest
            ${{ github.actor }}/marketing-os-api:${{ github.sha }}
          push: false
