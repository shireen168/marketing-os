name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-docs:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Verify documentation files
        run: |
          test -f README.md && echo "README.md OK"
          test -f SETUP.md && echo "SETUP.md OK"
          test -f WORKFLOW.md && echo "WORKFLOW.md OK"
          test -f CLAUDE.md && echo "CLAUDE.md OK"
          test -f examples/complete-example.md && echo "examples/complete-example.md OK"
          echo "All documentation files verified"

